"dota2-gsi Configuration"
{
    // Where Dota 2 sends HTTP POST requests — must match port in dota-gsi-listener.ps1
    "uri"       "http://localhost:49152/"

    // Seconds before Dota gives up waiting for a response from the listener
    "timeout"   "45.0"

    // Seconds of data to buffer before sending (lower = more responsive, higher = less noise)
    "buffer"    "5.0"

    // Minimum seconds between updates sent to the listener
    "throttle"  "45.0"

    // How often to send a heartbeat ping when nothing in the game state changes
    "heartbeat" "60.0"

    "data"
    {
        // Tower and barracks HP — used for tower-under-attack and tower-destroyed detection
        "buildings" "1"

        // Game provider metadata (game name, version, timestamp)
        "provider"  "1"

        // Game clock and state (pre-game, in-progress, post-game)
        "map"       "1"

        // KDA, gold, GPM, XPM, net worth, buyback cost and availability
        "player"    "1"

        // Hero name, level, current HP/mana, max HP/mana, alive status
        "hero"      "1"

        // Ability cooldowns and level — used to detect when ult comes off cooldown
        "abilities" "1"

        // Inventory (6 slots) and stash (5 slots) — sent as context to Claude every call
        "items"     "1"

        // Hero picks for both teams — used to generate the game plan on match start
        "draft"     "1"

        // Player positions on the minimap — enabled for potential future use
        "minimap"   "1"

        // Cosmetic wearables — not relevant for coaching, disabled to reduce payload size
        "wearables" "0"
    }
}
